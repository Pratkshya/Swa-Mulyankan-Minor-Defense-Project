<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Swa-Mulyankan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="container">
            <a href="/" class="logo">📚 Swa-Mulyankan</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/features">Features</a></li>
                <li><a href="/about">About</a></li>
            </ul>
            <a href="/login" class="btn-login">Login</a>
        </div>
    </nav>

    <!-- Sign Up Form -->
    <div class="auth-container">
        <h2>Create Account</h2>
        <p class="subtitle">Join thousands of SEE students mastering their concepts</p>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <div class="auth-footer">
            Have an account?
            <a href="/login">Login here</a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Swa-Mulyankan. Empowering SEE students with intelligent diagnostics.</p>
    </footer>
</body>
</html>
