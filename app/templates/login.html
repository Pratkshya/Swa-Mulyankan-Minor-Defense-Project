<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Swa-Mulyankan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="container">
            <a href="/" class="logo">📚 Swa-Mulyankan</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/features">Features</a></li>
                <li><a href="/about">About</a></li>
            </ul>
            <a href="/register" class="btn-signup">Sign Up</a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue your learning journey</p>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-submit">Login</button>
        </form>

        <div class="auth-footer">
            Don't have an account?
            <a href="/register">Sign up here</a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Swa-Mulyankan. Empowering SEE students with intelligent diagnostics.</p>
    </footer>
</body>
</html>
